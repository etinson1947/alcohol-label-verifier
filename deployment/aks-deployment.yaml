apiVersion: apps/v1
kind: Deployment
metadata:
  name: alcohol-label-verifier
spec:
  replicas: 3
  selector:
    matchLabels:
      app: verifier
  template:
    metadata:
      labels:
        app: verifier
    spec:
      containers:
        - name: app
          image: acr.azurecr.io/alcohol-verifier:latest
          ports:
            - containerPort: 8000
          env:
            - name: FLASK_ENV
              value: "production"
